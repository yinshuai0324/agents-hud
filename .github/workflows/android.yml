name: android

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "version name, e.g. 0.1.4 (defaults from the tag)"
        required: false

permissions:
  contents: write # create releases / upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Compute version
        id: ver
        run: |
          NAME="${{ github.event.inputs.version }}"
          [ -z "$NAME" ] && NAME="${GITHUB_REF_NAME#v}"
          echo "$NAME" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || NAME="0.0.0"
          IFS=. read -r MA MI PA <<< "$NAME"
          echo "name=$NAME"                              >> "$GITHUB_OUTPUT"
          echo "code=$(( MA*10000 + MI*100 + PA ))"      >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease \
            -PappVersionName=${{ steps.ver.outputs.name }} \
            -PappVersionCode=${{ steps.ver.outputs.code }}

      - name: Stage APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             "agents-hud-${{ steps.ver.outputs.name }}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agents-hud-${{ steps.ver.outputs.name }}
          path: agents-hud-${{ steps.ver.outputs.name }}.apk

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: agents-hud-${{ steps.ver.outputs.name }}.apk
          fail_on_unmatched_files: true
