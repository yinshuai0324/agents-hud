name: macos

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "version name, e.g. 0.1.4 (defaults from the tag)"
        required: false

permissions:
  contents: write # create releases / upload assets

jobs:
  build:
    runs-on: macos-14
    env:
      # Signing / notarization secrets. All optional: if absent, the app is
      # ad-hoc signed and not notarized (still builds — fine for forks).
      MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
      MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
      MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }} # optional; auto-detected if empty
      MAC_NOTARY_KEY_BASE64: ${{ secrets.MAC_NOTARY_KEY_BASE64 }}
      MAC_NOTARY_KEY_ID: ${{ secrets.MAC_NOTARY_KEY_ID }}
      MAC_NOTARY_ISSUER_ID: ${{ secrets.MAC_NOTARY_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: ver
        run: |
          NAME="${{ github.event.inputs.version }}"
          [ -z "$NAME" ] && NAME="${GITHUB_REF_NAME#v}"
          echo "$NAME" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || NAME="0.0.0"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        id: signing
        if: env.MAC_CERT_P12_BASE64 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MAC_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Add our keychain to the search list so codesign can find the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/cert.p12"
          IDENTITY="$MAC_SIGN_IDENTITY"
          if [ -z "$IDENTITY" ]; then
            IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F\" 'NR==1{print $2}')"
          fi
          [ -n "$IDENTITY" ] || { echo "no codesigning identity found in keychain" >&2; exit 1; }
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "Signing identity: $IDENTITY"

      - name: Build universal .app
        working-directory: mac
        env:
          CODESIGN_IDENTITY: ${{ steps.signing.outputs.identity }}
        run: UNIVERSAL=1 VERSION=${{ steps.ver.outputs.name }} bash build-app.sh

      - name: Package DMG
        working-directory: mac
        env:
          CODESIGN_IDENTITY: ${{ steps.signing.outputs.identity }}
        run: bash make-dmg.sh "agents-hud-${{ steps.ver.outputs.name }}-mac.dmg"

      - name: Notarize & staple
        if: env.MAC_NOTARY_KEY_BASE64 != '' && steps.signing.outputs.identity != ''
        working-directory: mac
        run: |
          DMG="agents-hud-${{ steps.ver.outputs.name }}-mac.dmg"
          echo "$MAC_NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$MAC_NOTARY_KEY_ID" \
            --issuer "$MAC_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          rm -f "$RUNNER_TEMP/notary.p8"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: agents-hud-${{ steps.ver.outputs.name }}-mac
          path: mac/agents-hud-${{ steps.ver.outputs.name }}-mac.dmg

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: mac/agents-hud-${{ steps.ver.outputs.name }}-mac.dmg
          fail_on_unmatched_files: true
